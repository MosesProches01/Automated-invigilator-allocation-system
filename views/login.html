<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Invigilator Allocation System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-form">
            <h2>Invigilator Allocation System</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <div id="loginError" class="text-center mt-20" style="color: #dc3545; display: none;"></div>
            <!-- Demo: Use username "admin" and password "admin123" -->
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                // Show loading state
                const submitBtn = e.target.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'Logging in...';
                submitBtn.disabled = true;
                
                // Attempt login
                await login(username, password);
                
                // Redirect based on user role
                const user = getCurrentUser();
                if (user.role === 'Examination Officer') {
                    window.location.href = '/officer-dashboard';
                } else if (user.role === 'Senior Invigilator' || user.role === 'Assistant Invigilator') {
                    window.location.href = '/invigilator-dashboard';
                } else {
                    window.location.href = '/officer-dashboard'; // Default fallback
                }
                
            } catch (error) {
                // Show error message
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                
                // Reset button state
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
        
        // Check if user is already logged in
        if (isAuthenticated()) {
            const user = getCurrentUser();
            if (user.role === 'Examination Officer') {
                window.location.href = '/officer-dashboard';
            } else {
                window.location.href = '/invigilator-dashboard';
            }
        }
    </script>
</body>
</html>
